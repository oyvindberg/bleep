$schema: https://raw.githubusercontent.com/oyvindberg/bleep/master/schema.json
$version: 1.0.0-M3
jvm:
  name: graalvm-community:25.0.1
resolvers:
  - https://packages.jetbrains.team/maven/p/ij/intellij-dependencies
projects:
  bleep-cli:
    dependencies:
    - ch.epfl.scala::bloop-config:2.3.3
    - ch.linkyard.mcp::mcp-server:0.3.3
    - ch.linkyard.mcp::jsonrpc2-stdio:0.3.3
    - com.lihaoyi::pprint:0.9.6
    - com.monovore::decline:2.5.0
    - com.typesafe:config:1.4.5
    - org.gnieh::diffson-circe:4.6.1
    - org.scalameta:svm-subs:101.0.0
      # note: weird binary incompatibility when bumping this for scala3
    - org.typelevel::cats-core:2.9.0
    - org.typelevel::cats-parse:1.0.0
    dependsOn: bleep-core
    extends:
    - template-common
    - template-scala-3
    platform:
      mainClass: bleep.Main
    sources: ./bleep-cli/src/scala-3
  bleep-core:
    dependencies:
    - ch.epfl.scala:bsp4j:2.2.0-M2
    - co.fs2::fs2-core:3.10.2
    - com.google.code.gson:gson:2.10.1
    - com.olvind.ryddig::ryddig:0.0.6
    - com.olvind.ryddig::ryddig-jul:0.0.6
    - com.olvind.tui::tui:0.0.9
    - com.swoval:file-tree-views:2.1.12
    - io.github.alexarchambault.native-terminal:native-terminal:0.0.9.1
    - org.typelevel::cats-effect:3.5.4
    - org.typelevel::scalac-options:0.1.8
    dependsOn:
    - bleep-model
    - bleep-nosbt
    - bleep-bsp-protocol
    - bleep-test-runner
    extends: template-cross-all
    sources: ../liberated/sbt-tpolecat/plugin/src/main/scala
  bleep-model:
    dependencies:
    - io.circe::circe-generic:0.14.15
    - io.circe::circe-yaml-v12:1.15.0
    - for3Use213: true
      module: io.get-coursier::coursier-jvm:2.1.24
    - for3Use213: true
      module: io.get-coursier::coursier-sbt-maven-repository:2.1.24
    - for3Use213: true
      module: io.get-coursier::coursier:2.1.24
    - org.snakeyaml:snakeyaml-engine:2.9
    extends: template-cross-all
    sourcegen:
      main: bleep.scripts.GenerateResources
      project: scripts-init
  bleep-nosbt:
    dependencies:
    - for3Use213: true
      module: com.eed3si9n::sjson-new-scalajson:0.13.1
    - org.scala-lang.modules::scala-xml:2.4.0
    extends: template-cross-all
    scala:
      strict: false
    sources:
    - ../liberated/librarymanagement/core/src/main/contraband-scala
    - ../liberated/librarymanagement/core/src/main/java
    - ../liberated/librarymanagement/core/src/main/scala
  bleep-plugin-ci-release:
    dependsOn:
    - bleep-plugin-dynver
    - bleep-plugin-pgp
    - bleep-plugin-sonatype
    extends:
    - template-cross-all
    - template-parcollection-ok
    sources: ../liberated/sbt-ci-release/plugin/src/main/scala
  bleep-plugin-dynver:
    dependsOn: bleep-core
    extends: template-cross-all
    sources:
    - ../liberated/sbt-dynver/dynver/src/main/scala
    - ../liberated/sbt-dynver/sbtdynver/src/main/scala
  bleep-plugin-git-versioning:
    dependencies: se.sawano.java:alphanumeric-comparator:2.0.0
    dependsOn: bleep-core
    extends: template-cross-all
    sources: ../liberated/sbt-git-versioning/src/main/scala
  bleep-plugin-jni:
    dependencies: org.ow2.asm:asm:9.9
    dependsOn: bleep-core
    extends: template-cross-all
    sources:
    - ../liberated/sbt-jni/core/src/main/scala
    - ../liberated/sbt-jni/plugin/src/main/java
    - ../liberated/sbt-jni/plugin/src/main/scala
  bleep-plugin-mdoc:
    dependencies: org.jsoup:jsoup:1.21.2
    dependsOn: bleep-core
    extends: template-cross-all
    sources: ../liberated/mdoc/mdoc-sbt/src/main/scala
  bleep-plugin-native-image:
    dependencies:
    - com.lihaoyi::os-lib:0.11.6
    - org.ow2.asm:asm:9.9
    dependsOn: bleep-core
    extends: template-cross-all
    resources: ../liberated/sbt-native-image/plugin/src/main/resources
    sources: ../liberated/sbt-native-image/plugin/src/main/scala
  bleep-plugin-pgp:
    dependencies:
    - com.eed3si9n::gigahorse-okhttp:0.9.3
    - org.bouncycastle:bcpg-jdk15on:1.70
    - org.scala-lang.modules::scala-parser-combinators:2.4.0
    dependsOn: bleep-core
    extends: template-cross-all
    sources:
    - ../liberated/sbt-pgp/gpg-library/src/main/scala
    - ../liberated/sbt-pgp/sbt-pgp/src/main/scala
  bleep-plugin-scalafix:
    dependencies: ch.epfl.scala:scalafix-interfaces:0.14.4
    dependsOn: bleep-core
    extends: template-cross-all
    sources: ../liberated/mill-scalafix/mill-scalafix/src
  bleep-plugin-sonatype:
    dependencies:
    - com.lumidion::sonatype-central-client-sttp-core:0.3.0
    - com.lumidion::sonatype-central-client-upickle:0.3.0
    - com.softwaremill.sttp.client4::slf4j-backend:4.0.0-M16
    - com.softwaremill.sttp.client4::upickle:4.0.0-M16
    - org.sonatype.spice.zapper:spice-zapper:1.3
    - org.wvlet.airframe::airframe-http:24.12.2
    dependsOn: bleep-core
    extends:
    - template-cross-all
    - template-parcollection-ok
    sources: ../liberated/sbt-sonatype/src/main/scala
  bleep-test-runner:
    dependencies:
      - org.scala-sbt:test-interface:1.0
      - net.aichler:jupiter-interface:0.11.1
      - org.junit.vintage:junit-vintage-engine:5.9.1
    java:
      options: -proc:none
    platform:
      name: jvm
    sources: ./src/main/java
    resources: ./src/main/resources
  bleep-bsp:
    dependencies:
    - org.scala-lang::scala3-compiler:3.7.4
    - org.jetbrains.kotlin:kotlin-compiler:2.3.0
    - org.jetbrains.kotlin:kotlin-metadata-jvm:2.3.0
    - ch.epfl.scala::tasty-query:1.6.1
    - org.ow2.asm:asm:9.7.1
    - com.github.plokhotnyuk.jsoniter-scala::jsoniter-scala-core:2.32.0
    - com.github.plokhotnyuk.jsoniter-scala::jsoniter-scala-macros:2.32.0
    - org.typelevel::cats-effect:3.5.4
    - for3Use213: true
      module: org.scala-sbt::zinc:1.12.0
    - for3Use213: true
      module: ch.epfl.scala::libdaemon:0.0.12
    dependsOn:
    - bleep-model
    - bleep-core
    - bleep-bsp-protocol
    - bleep-test-runner
    extends:
    - template-common
    - template-scala-3
  bleep-bsp-protocol:
    dependencies:
    - io.circe::circe-generic:0.14.15
    - io.circe::circe-parser:0.14.15
    extends: template-cross-all
  bleep-bsp-tests:
    dependencies:
    - org.scalatest::scalatest:3.2.19
    - org.typelevel::cats-effect-testkit:3.5.4
    - for3Use213: true
      module: io.get-coursier::coursier:2.1.24
    dependsOn: bleep-bsp
    extends:
    - template-common
    - template-scala-3
    isTestProject: true
    scala:
      strict: false
  bleep-tests:
    dependencies: org.scalatest::scalatest:3.2.19
    dependsOn:
    - bleep-cli
    - bleep-bsp
    extends:
    - template-common
    - template-scala-3
    isTestProject: true
    scala:
      strict: false
  scripts:
    dependencies:
    - build.bleep::bleep-plugin-ci-release:${BLEEP_VERSION}
    - build.bleep::bleep-plugin-mdoc:${BLEEP_VERSION}
    - build.bleep::bleep-plugin-native-image:${BLEEP_VERSION}
    - build.bleep::bleep-plugin-scalafix:${BLEEP_VERSION}
    extends:
    - template-common
    - template-scala-3
  scripts-init:
    dependencies: build.bleep::bleep-plugin-dynver:${BLEEP_VERSION}
    extends:
    - template-common
    - template-scala-3
scripts:
  generate-docs:
    main: bleep.scripts.GenDocumentation
    project: scripts
  generate-videos:
    main: bleep.scripts.GenDemoVideos
    project: scripts
  it:
    main: bleep.scripts.It
    project: scripts
  my-publish-local:
    main: bleep.scripts.PublishLocal
    project: scripts
  native-image:
    main: bleep.scripts.GenNativeImage
    project: scripts
  publish:
    main: bleep.scripts.Publish
    project: scripts
  scalafix:
    main: bleep.scripts.Scalafix
    project: scripts
templates:
  template-common:
    java:
      options: -proc:none
    platform:
      name: jvm
    scala:
      options: -encoding utf8 -feature -language:experimental.macros -language:higherKinds
        -language:implicitConversions -unchecked
      strict: true
  template-cross-all:
    cross:
      jvm213:
        scala:
          options: -Xsource:3
          version: 2.13.18
      jvm3:
        extends: template-scala-3
    extends: template-common
  template-parcollection-ok:
    libraryVersionSchemes: org.scala-lang.modules::scala-parallel-collections:always
  template-scala-3:
    scala:
      options: -source 3.4 -no-indent -Wconf:name=PatternMatchExhaustivity:error
      version: 3.7.4
