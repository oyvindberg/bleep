name: Build
on:
  push:
    tags: [ 'v*' ]
    branches: [ 'master' ]
  pull_request:
    branches: [ 'master' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    timeout-minutes: 15
    # need to be newer than `ubuntu-20.04` because of scalafmt native binary
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: bleep-build/bleep-setup-action@0.0.2
      - uses: coursier/cache-action@v8
        with:
          extraFiles: bleep.yaml

      - name: Scalafmt Check
        run: |
          bleep compile bleep-cli
          bleep setup-dev-script bleep-cli
          ./bleep-cli.sh --dev fmt --check

      - name: Run tests
        env:
          CI: true
        run: |
          bleep compile
          bleep sourcegen
          # publish locally so test runner and bsp server are available
          bleep my-publish-local
          # stop compile server since the compile server itself may have changed
          bleep config compile-server stop-all
          bleep setup-dev-script bleep-cli
          ./bleep-cli.sh --dev test

  yaml-ls-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: InoUno/yaml-ls-check@develop
        with:
          root: .
          schemaMapping: |
            {
                "schema.json": [ "**/bleep.yaml" ]
            }

  build-intellij-plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build IntelliJ Plugin
        working-directory: intellij-plugin
        run: ./gradlew build

  build-native-image:
    name: Native image build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            file_name: bleep
            artifact_name: bleep-x86_64-pc-linux
            run_tests: true
            bootstrap_coursier: false
          - os: ubuntu-22.04-arm
            file_name: bleep
            artifact_name: bleep-arm64-pc-linux
            run_tests: true
            bootstrap_coursier: true
          - os: macos-15-intel
            file_name: bleep
            artifact_name: bleep-x86_64-apple-darwin
            run_tests: false
            bootstrap_coursier: false
          - os: macos-latest
            file_name: bleep
            artifact_name: bleep-arm64-apple-darwin
            run_tests: false
            bootstrap_coursier: false
          - os: windows-latest
            file_name: bleep.exe
            artifact_name: bleep-x86_64-pc-win32
            run_tests: true
            bootstrap_coursier: false
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # ARM64 Linux needs JDK 21+ for UnixDomainSocketAddress in BSP server
      - uses: actions/setup-java@v5
        if: ${{ matrix.bootstrap_coursier }}
        with:
          distribution: 'temurin'
          java-version: '21'

      # Standard bootstrap via setup action (platforms with existing native binaries)
      - uses: bleep-build/bleep-setup-action@0.0.2
        if: ${{ !matrix.bootstrap_coursier }}

      # Bootstrap via Coursier for ARM64 Linux (no pre-built native binary yet).
      # Pin to the exact version from bleep.yaml so bleep recognizes it as current
      # and skips the native image re-launch (runs on JVM directly).
      - name: Bootstrap bleep via Coursier
        if: ${{ matrix.bootstrap_coursier }}
        run: |
          BLEEP_VERSION=$(grep '^\$version:' bleep.yaml | cut -d' ' -f2)
          echo "Bootstrapping bleep $BLEEP_VERSION via Coursier"
          curl -fL "https://github.com/coursier/launchers/raw/master/cs-aarch64-pc-linux.gz" | gzip -d > cs
          chmod +x cs
          ./cs install --channel https://raw.githubusercontent.com/oyvindberg/bleep/master/coursier-channel.json "bleep:$BLEEP_VERSION" --install-dir /usr/local/bin
          rm cs

      - uses: coursier/cache-action@v8
        with:
          extraFiles: bleep.yaml

      - name: Build native image (non-windows)
        run: |
          bleep compile bleep-cli
          bleep sourcegen
          # publish locally so test runner and bsp server are available
          bleep my-publish-local
          # stop compile server since the compile server itself may have changed
          bleep config compile-server stop-all
          bleep setup-dev-script bleep-cli
          ./bleep-cli.sh --dev native-image ${{ matrix.file_name }}

        if: runner.os != 'Windows'

      - name: Test binary after build (non-windows)
        env:
          CI: true
        run: |
          ./${{ matrix.file_name }} --dev test --no-color jvm3
          ./${{ matrix.file_name }} selftest
        if: runner.os != 'Windows' && matrix.run_tests

        # Windows: cmd shell, one command per step
      - name: Compile (windows)
        run: bleep compile bleep-cli
        shell: cmd
        if: runner.os == 'Windows'
      - name: Restart compile server before sourcegen (windows)
        run: bleep config compile-server stop-all
        shell: cmd
        if: runner.os == 'Windows'
      - name: Sourcegen (windows)
        run: bleep sourcegen
        shell: cmd
        if: runner.os == 'Windows'
      - name: Publish locally (windows)
        run: bleep my-publish-local
        shell: cmd
        if: runner.os == 'Windows'
      - name: Setup GraalVM (windows)
        uses: graalvm/setup-graalvm@v1
        if: runner.os == 'Windows'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          distribution: 'graalvm-community'
          java-version: '25.0.1'
          native-image-job-reports: 'true'
      - name: Stop compile server and clean state (windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: |
          $ErrorActionPreference = 'Continue'
          # Force kill any remaining java processes (BSP servers)
          # Must do this before compile-server stop-all to avoid Windows file locking issues
          & taskkill /F /IM java.exe 2>$null
          Start-Sleep -Seconds 3
          # Clean up socket directories manually since stop-all may fail with locked files
          $socketDir = Join-Path $env:USERPROFILE ".bleep" "cache" "socket"
          if (Test-Path $socketDir) {
            Remove-Item -Path $socketDir -Recurse -Force -ErrorAction SilentlyContinue
          }
          $cacheSocketDir = Join-Path $env:LOCALAPPDATA "bleep" "cache" "socket"
          if (Test-Path $cacheSocketDir) {
            Remove-Item -Path $cacheSocketDir -Recurse -Force -ErrorAction SilentlyContinue
          }
          # Delete BSP classpath cache so the dev server re-resolves from ivy local
          $cacheDir = Join-Path $env:USERPROFILE ".bleep" "cache"
          Get-ChildItem -Path $cacheDir -Filter "bleep-bsp-classpath-*.txt" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "Deleting BSP classpath cache: $($_.FullName)"
            Remove-Item -Path $_.FullName -Force -ErrorAction SilentlyContinue
          }
          exit 0
      - name: Setup dev script (windows)
        run: bleep setup-dev-script bleep-cli
        shell: cmd
        if: runner.os == 'Windows'
      - name: Build native image (windows)
        run: bleep-cli.bat --dev native-image ${{ matrix.file_name }}
        shell: cmd
        if: runner.os == 'Windows'
      - name: Test binary after build (windows)
        env:
          CI: true
        run: |
          ${{ matrix.file_name }} --dev test --no-color bleep-tests
          ${{ matrix.file_name }} selftest
        shell: cmd
        if: runner.os == 'Windows' && matrix.run_tests

      - name: Temporarily save package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.file_name }}
          retention-days: 1

  release:
    timeout-minutes: 20
    runs-on: ubuntu-22.04
    needs: [ build, build-native-image, yaml-ls-check, build-intellij-plugin ]
    if: "startsWith(github.ref, 'refs/tags/v')"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: bleep-build/bleep-setup-action@0.0.2
      - uses: coursier/cache-action@v8
        with:
          extraFiles: bleep.yaml
      - id: get_version
        uses: battila7/get-version-action@v2
      - name: Publish bleep-bsp and test-runner locally
        run: |
          bleep compile bleep-cli
          bleep sourcegen
          bleep my-publish-local
          bleep config compile-server stop-all
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts
      - name: Display structure of downloaded files
        run: find artifacts
      - name: Release
        run: |
          chmod +x ./artifacts/bleep-x86_64-pc-linux/bleep
          ./artifacts/bleep-x86_64-pc-linux/bleep --dev publish
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      - name: Prepare files
        run: |
          export VERSION=${{ steps.get_version.outputs.version-without-v }}
          bash .github/prepare-release.sh
      - name: Upload-to-release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.get_version.outputs.version-without-v }}"
          prerelease: false
          generate_release_notes: true
          files: |
            work/release/*
