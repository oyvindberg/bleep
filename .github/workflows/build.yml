name: Build
on:
  push:
    tags: [ 'v*' ]
    branches: [ 'master' ]
  pull_request:
    branches: [ 'master' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    timeout-minutes: 15
    # need to be newer than `ubuntu-20.04` because of scalafmt native binary
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: bleep-build/bleep-setup-action@0.0.2
      - uses: coursier/cache-action@v8
        with:
          extraFiles: bleep.yaml

      - name: Scalafmt Check
        run: |
          bleep compile bleep-cli@jvm3
          bleep setup-dev-script bleep-cli@jvm3
          ./bleep-cli@jvm3.sh --dev fmt --check

      - name: Run tests
        env:
          CI: true
        run: |
          bleep compile
          bleep sourcegen
          # publish locally so test runner and bsp server are available
          bleep my-publish-local
          # stop compile server since the compile server itself may have changed
          bleep config compile-server stop-all
          bleep setup-dev-script bleep-cli@jvm3
          ./bleep-cli@jvm3.sh --dev test

  yaml-ls-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: InoUno/yaml-ls-check@develop
        with:
          root: .
          schemaMapping: |
            {
                "schema.json": [ "**/bleep.yaml" ]
            }

  build-intellij-plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build IntelliJ Plugin
        working-directory: intellij-plugin
        run: ./gradlew build

  build-native-image:
    name: Native image build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            file_name: bleep
            artifact_name: bleep-x86_64-pc-linux
            run_tests: true
          - os: macos-15-intel
            file_name: bleep
            artifact_name: bleep-x86_64-apple-darwin
            run_tests: false
          - os: macos-latest
            file_name: bleep
            artifact_name: bleep-arm64-apple-darwin
            run_tests: false
          - os: windows-latest
            file_name: bleep.exe
            artifact_name: bleep-x86_64-pc-win32
            run_tests: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: bleep-build/bleep-setup-action@0.0.2

      - uses: coursier/cache-action@v8
        with:
          extraFiles: bleep.yaml

      - name: Build native image (non-windows)
        run: |
          bleep compile bleep-cli@jvm3
          bleep sourcegen
          # publish locally so test runner and bsp server are available
          bleep my-publish-local
          # stop compile server since the compile server itself may have changed
          bleep config compile-server stop-all
          bleep setup-dev-script bleep-cli@jvm3
          ./bleep-cli@jvm3.sh --dev native-image ${{ matrix.file_name }}

        if: runner.os != 'Windows'

      - name: Test binary after build (non-windows)
        env:
          CI: true
        run: |
          ./${{ matrix.file_name }} --dev test --no-color jvm3
          ./${{ matrix.file_name }} selftest
        if: runner.os != 'Windows' && matrix.run_tests

        # Windows: cmd shell, one command per step
        # The released bleep creates jars with backslash path entries on Windows
        # (e.g. bleep\bsp\BspServerDaemon.class instead of bleep/bsp/...).
        # After publish-local, we fix these jars by re-creating them from the
        # extracted contents, which normalizes entries to forward slashes.
      - name: Build native image 1 (windows)
        run: bleep compile bleep-cli@jvm3
        shell: cmd
        if: runner.os == 'Windows'
      - name: Build native image 2 (windows)
        run: bleep sourcegen
        shell: cmd
        if: runner.os == 'Windows'
      - name: Build native image 3 (windows)
        run: bleep my-publish-local
        shell: cmd
        if: runner.os == 'Windows'
      - name: Setup GraalVM (windows)
        uses: graalvm/setup-graalvm@v1
        if: runner.os == 'Windows'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          distribution: 'graalvm-community'
          java-version: '25.0.1'
          native-image-job-reports: 'true'
      - name: Fix backslash jar entries (windows)
        shell: pwsh
        if: runner.os == 'Windows'
        run: |
          # Find all jars published by bleep to local ivy and fix backslash entries
          $ivyLocal = "$env:USERPROFILE\.ivy2\local\build.bleep"
          if (Test-Path $ivyLocal) {
            Get-ChildItem -Path $ivyLocal -Filter "*.jar" -Recurse | ForEach-Object {
              $jar = $_.FullName
              $tmp = "$jar.fix"
              $extractDir = "$jar.extracted"
              # Extract jar contents (filesystem normalizes backslash entries to directories)
              New-Item -ItemType Directory -Path $extractDir -Force | Out-Null
              Push-Location $extractDir
              & jar xf $jar 2>$null
              Pop-Location
              if (Test-Path "$extractDir\META-INF") {
                # Re-create jar with normalized forward-slash entries
                & jar cf $tmp -C $extractDir .
                if ($LASTEXITCODE -eq 0) {
                  Move-Item -Path $tmp -Destination $jar -Force
                }
              }
              Remove-Item -Path $extractDir -Recurse -Force -ErrorAction SilentlyContinue
              Remove-Item -Path $tmp -Force -ErrorAction SilentlyContinue
            }
            Write-Host "Fixed jar entries in $ivyLocal"
          }
      - name: Build native image 4 (windows)
        # stop compile server since the compile server itself may have changed
        run: bleep config compile-server stop-all
        shell: cmd
        if: runner.os == 'Windows'
      - name: Build native image 5 (windows)
        run: bleep setup-dev-script bleep-cli@jvm3
        shell: cmd
        if: runner.os == 'Windows'
      - name: Build native image 6 (windows)
        run: bleep-cli@jvm3.bat --dev native-image ${{ matrix.file_name }}
        shell: cmd
        if: runner.os == 'Windows'
      - name: Test binary after build (windows)
        run: ${{ matrix.file_name }} --dev test --no-color jvm3
        shell: cmd
        if: runner.os == 'Windows'
      - name: Selftest (windows)
        run: ${{ matrix.file_name }} selftest
        shell: cmd
        if: runner.os == 'Windows'

      - name: Temporarily save package
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.file_name }}
          retention-days: 1

  release:
    timeout-minutes: 20
    runs-on: ubuntu-22.04
    needs: [ build, build-native-image, yaml-ls-check, build-intellij-plugin ]
    if: "startsWith(github.ref, 'refs/tags/v')"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: bleep-build/bleep-setup-action@0.0.2
      - uses: coursier/cache-action@v8
        with:
          extraFiles: bleep.yaml
      - id: get_version
        uses: battila7/get-version-action@v2
      - name: Publish bleep-bsp and test-runner locally
        run: |
          bleep compile bleep-cli@jvm3
          bleep sourcegen
          bleep my-publish-local
          bleep config compile-server stop-all
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts
      - name: Display structure of downloaded files
        run: find artifacts
      - name: Release
        run: |
          chmod +x ./artifacts/bleep-x86_64-pc-linux/bleep
          ./artifacts/bleep-x86_64-pc-linux/bleep --dev publish
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      - name: Prepare files
        run: |
          export VERSION=${{ steps.get_version.outputs.version-without-v }}
          bash .github/prepare-release.sh
      - name: Upload-to-release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.get_version.outputs.version-without-v }}"
          prerelease: false
          generate_release_notes: true
          files: |
            work/release/*
